<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحقق من هوية الموظفين | المؤشر الأخضر</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', system-ui, -apple-system, sans-serif;
            background-color: #f4f7f5;
            color: #2d3748;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .verification-container {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        /* تنسيق الهيدر العلوي للمؤسسة */
        .card-header {
            background: linear-gradient(135deg, #1e3a2f 0%, #2d5a45 100%);
            padding: 25px 20px;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            border-bottom: 4px solid #48bb78;
        }

        .company-logo {
            width: 75px;
            height: auto;
            background-color: transparent !important;
            border: none !important;
            outline: none;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
        }

        .company-name {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .system-title {
            font-size: 13px;
            font-weight: 400;
            color: #a0aec0;
            text-transform: uppercase;
        }

        /* محتوى البطاقة الداخلي */
        .card-body {
            padding: 40px 30px;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* واجهة البحث المؤقتة (مدتها ثانيتين) */
        #loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        .spinner-container {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .spinner {
            width: 100%;
            height: 100%;
            border: 4px solid #edf2f7;
            border-top: 4px solid #38a169;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .pulse-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 35px;
            height: auto;
            opacity: 0.7;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .loading-text {
            font-size: 15px;
            font-weight: 500;
            color: #718096;
        }

        /* واجهة النجاح والانبثاق */
        #success-state {
            display: none;
            width: 100%;
        }

        .checkmark-wrapper {
            width: 90px;
            height: 90px;
            margin: 0 auto 20px auto;
        }

        /* رسمة الـ SVG للصح الأخضر */
        .svg-checkmark {
            width: 100%;
            height: 100%;
            transform: scale(0);
            opacity: 0;
        }

        /* حركة الانبثاق السريع جداً (ربع ثانية) */
        .svg-checkmark.animate {
            animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .status-badge {
            background-color: #f0fff4;
            border: 1px solid #c6f6d5;
            color: #22543d;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 25px;
        }

        /* جدول بيانات الموظفة */
        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            text-align: right;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #edf2f7;
        }

        .info-row {
            display: flex;
            border-bottom: 1px solid #edf2f7;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            width: 35%;
            background-color: #f7fafc;
            padding: 12px 15px;
            font-weight: 500;
            color: #4a5568;
            font-size: 13px;
        }

        .info-value {
            width: 65%;
            padding: 12px 15px;
            font-weight: 600;
            color: #1a202c;
            font-size: 14px;
        }

        /* تذييل الصفحة السفلي */
        .card-footer {
            background-color: #fafafa;
            padding: 15px 20px;
            border-top: 1px solid #edf2f7;
            font-size: 11px;
            color: #a0aec0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .secure-lock {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #48bb78;
            font-weight: 500;
        }

        /* حركات التحريك (Animations) */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.9; }
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            80% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="verification-container">
        <div class="card-header">
            <img class="company-logo" src="images/IMG_1139.png" alt="شعار شركة المؤشر الأخضر">
            <div class="company-name"> المؤشر الأخضر</div>
            
            <div class="system-title">بوابة التحقق الذكي من الهوية</div>
        </div>

        <div class="card-body">
            
            <div id="loading-state">
                <div class="spinner-container">
      
                    <div class="spinner"></div>
                </div>
                <div class="loading-text">جاري البحث في قاعدة البيانات ...</div>
            </div>

            <div id="success-state">
   
                <div class="checkmark-wrapper">
                    <svg class="svg-checkmark" id="checkmark-svg" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="26" cy="26" r="25" fill="#38a169"/>
     
                        <path d="M16 26L23 33L37 19" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>

                <div class="status-badge">
                    
                    <span>تم التحقق من صحة البطاقة</span>
                </div>

                <div class="info-table">
                    <div class="info-row">
                      
                        <div class="info-label">اسم الموظفة</div>
                        <div class="info-value">ريم محمد صالح</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">رقم التوظيف</div>
  
                        <div class="info-value">GI-8942</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">المسمى </div>
          
                        <div class="info-value">مختصة إنشاء البيانات البصرية</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">الإدارة</div>
                
                        <div class="info-value">هديل سعد العتيبي</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">حالة الحساب</div>
                      
                        <div class="info-value" style="color: #38a169;">نشط / مصرح له</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">وقت التحقق</div>
                        <div class="info-value" id="verification-time">-</div>
                    </div>
                </div>
            </div>

        </div>

        <div class="card-footer">
            <div class="secure-lock">
          
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                </svg>
                اتصال آمن ومُشفر
            </div>
            <div>الرقم المرجعي: GI-VRF-2026</div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // مؤقت لمدة ثانيتين للبحث الشكلي في قاعدة البيانات
            setTimeout(function() {
      
                // إخفاء التحميل
                document.getElementById('loading-state').style.display = 'none';
                // إظهار النتيجة والبيانات
                const successState = document.getElementById('success-state');
                successState.style.display = 'block';
                
                // تفعيل حركة انبثاق الصح الأخضر خلال ربع ثانية
                const checkmark = document.getElementById('checkmark-svg');
                checkmark.classList.add('animate');
                
                // طباعة الوقت الفعلي الحالي للتحقق
                const now = new Date();
                const options = { 
                    year: 'numeric', 
                    month: '2-digit', 
                    day: '2-digit',
                    hour: '2-digit', 
         
                    minute: '2-digit', 
                    second: '2-digit',
                    hour12: true
                };
                document.getElementById('verification-time').innerText = now.toLocaleString('ar-EG', options);
                
            }, 2000); // 2000 مللي ثانية = ثانيتين
        });
    </script>
</body>
</html>
